<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chiel Borgonjen — UX & Service Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { garamond: ['"EB Garamond"', 'serif'] },
          colors: { accent: '#659d89' }
        }
      }
    }
  </script>
  <style>
    p, li {
      font-family: 'Inter', sans-serif !important;
      font-weight: 300 !important;
      line-height: 1.5 !important;
      color: #666;
      font-size: 16px;
    }
    p.garamond {
      font-family: 'EB Garamond', serif !important;
      font-weight: 400 !important;
    }
    p.garamond-500 {
      font-family: 'EB Garamond', serif !important;
      font-weight: 500 !important;
    }

    /* Intro curtain */
    #intro-curtain {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #f8f8f7;
      transform: translateY(0);
      transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
      pointer-events: none;
    }
    #intro-curtain.up {
      transform: translateY(-100%);
    }

    /* Per-line reveal */
    .anim-line {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.85s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .anim-line.in {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-[#f8f8f7] font-garamond max-w-[1440px] mx-auto">

  <!-- Intro curtain -->
  <div id="intro-curtain"></div>

  <!-- Hero — full viewport height -->
  <section class="min-h-screen flex flex-col px-6 sm:px-12 lg:px-40">

    <!-- Logo -->
    <header class="pt-8 lg:pt-10 pb-0 shrink-0">
      <a href="index.html" class="anim-line">
        <img src="assets/logo.png" alt="Chiel Borgonjen" class="h-8 lg:h-10 w-auto">
      </a>
    </header>

    <!-- Intro text — vertically centred -->
    <div class="flex-1 flex flex-col justify-center py-12 lg:py-20">
      <h1 class="anim-line text-[36px] sm:text-[52px] lg:text-[72px] font-normal leading-[1.15] text-accent mb-1 lg:mb-2">Chiel Borgonjen</h1>
      <p class="anim-line garamond text-[36px] sm:text-[52px] lg:text-[72px] leading-[1.25] text-black">— UX &amp; Service Designer</p>
      <p class="anim-line garamond text-[36px] sm:text-[52px] lg:text-[72px] leading-[1.25] text-black">based in Rotterdam</p>
      <p class="anim-line garamond text-[36px] sm:text-[52px] lg:text-[72px] leading-[1.25] text-black">part time bread baker</p>
    </div>

    <!-- Browse projects -->
    <div class="pb-10 lg:pb-12 shrink-0">
      <a href="#projects" class="anim-line inline-flex items-center gap-3 text-[16px] font-normal text-[#666] hover:text-black transition-colors">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 2v14M2 9l7 7 7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Browse projects
      </a>
    </div>

  </section>

  <!-- Projects -->
  <section id="projects" class="px-6 sm:px-12 lg:px-40 pb-20 lg:pb-32 flex flex-col sm:flex-row gap-8 lg:gap-10">

    <!-- Project 1: Rituals -->
    <div class="flex-1">
      <a href="project-rituals.html" class="block overflow-hidden mb-4 h-[240px] sm:h-[320px] lg:h-[420px] bg-[#f0ede8] flex items-center justify-center" style="transform-style: preserve-3d;">
        <img
          src="assets/rituals-thumbnail.png"
          alt="CRM Loyalty Program — Rituals"
          class="w-full h-full object-contain hover:scale-[1.03] transition-transform duration-500 ease-in-out"
        >
      </a>
      <p class="text-[14px] text-[#666]">Service Design · UX Design</p>
      <a href="project-rituals.html" class="text-[20px] lg:text-[24px] font-normal text-black leading-[36px] block hover:text-accent transition-colors">CRM Loyalty Program</a>
      <p class="text-[14px] text-[#666]">Rituals · 2022–2023</p>
    </div>

    <!-- Project 2: AIHR -->
    <div class="flex-1">
      <a href="project-aihr.html" class="block overflow-hidden mb-4 h-[240px] sm:h-[320px] lg:h-[420px]" style="transform-style: preserve-3d;">
        <img
          src="https://cdn.prod.website-files.com/630646ab81dae48583ebe181/686244ff6ba127b9f02f1573_resource%20library%20mockup.png"
          alt="Resource Library Redesign — AIHR"
          class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500 ease-in-out"
        >
      </a>
      <p class="text-[14px] text-[#666]">UX Design · Product Design</p>
      <a href="project-aihr.html" class="text-[20px] lg:text-[24px] font-normal text-black leading-[36px] block hover:text-accent transition-colors">Resource Library Redesign</a>
      <p class="text-[14px] text-[#666]">AIHR · 2024</p>
    </div>

  </section>

  <script>
    const curtain = document.getElementById('intro-curtain');
    const lines = document.querySelectorAll('.anim-line');

    // Slide curtain up after a brief pause
    setTimeout(() => curtain.classList.add('up'), 200);

    // Stagger text lines in after curtain clears (~1.1s total)
    lines.forEach((el, i) => {
      setTimeout(() => el.classList.add('in'), 1000 + i * 130);
    });
  </script>

</body>
</html>
